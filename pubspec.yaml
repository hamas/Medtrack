name: medtrack
description: "A professional medical-grade medicine tracking application built with 100% pure Dart and Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  google_sign_in_platform_interface: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  local_auth: ^3.0.1
  material_symbols_icons: ^4.2928.1
  path: ^1.9.1
  pdf: ^3.12.0
  permission_handler: ^12.0.1
  printing: ^5.14.3
  riverpod_annotation: ^4.0.2
  sqflite: ^2.4.2
  timezone: ^0.11.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/notification_bell.png
    - assets/images/default_avatar.png
    - assets/images/medication_3d.png
    - assets/images/splash_logo.png
    - assets/images/medicine_bottle_3d.png
    - assets/images/capsule_3d.png
    - assets/images/syringe_3d.png
